          background: brand.primary, padding: "72px 52px",
          display: "flex", alignItems: "center", justifyContent: "space-between"
        }}>
          <div>
            <h2 style={{
              fontFamily: getDisplayFont(brand.primaryFont),
              color: "white", fontSize: 34, fontWeight: 700, margin: "0 0 12px"
            }}>Ready to elevate your brand?</h2>
            <p style={{
              color: "rgba(255,255,255,0.65)", fontSize: 16, margin: 0,
              fontFamily: `'${brand.bodyFont}', sans-serif`
            }}>Let's build something worth remembering.</p>
          </div>
          <div style={{
            background: brand.secondary, color: "white",
            padding: "16px 38px", borderRadius: 6, fontSize: 14,
            fontWeight: 700, cursor: "pointer", flexShrink: 0,
            fontFamily: `'${brand.bodyFont}', sans-serif`
          }}>Schedule a Call</div>
        </div>
      );

      const typographySection = (
        <div style={{ padding: "64px 52px", background: brand.background }}>
          <div style={{
            color: brand.secondary, fontSize: 11, fontWeight: 700,
            letterSpacing: "0.2em", textTransform: "uppercase", marginBottom: 52,
            fontFamily: `'${brand.bodyFont}', sans-serif`
          }}>Brand Style Guide</div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 56, marginBottom: 60 }}>
            <div>
              <p style={{ fontSize: 11, color: "#aaa", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 20 }}>
                Display — Roca
              </p>
              <div style={{ fontFamily: getDisplayFont(brand.primaryFont), color: brand.primary }}>
                <div style={{ fontSize: 44, fontWeight: 700, lineHeight: 1.15, marginBottom: 12 }}>Heading One</div>
                <div style={{ fontSize: 32, fontWeight: 600, lineHeight: 1.25, marginBottom: 12 }}>Heading Two</div>
                <div style={{ fontSize: 22, fontWeight: 400, lineHeight: 1.4 }}>Heading Three</div>
              </div>
            </div>
            <div>
              <p style={{ fontSize: 11, color: "#aaa", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 20 }}>
                Body — {brand.bodyFont}
              </p>
              <div style={{ fontFamily: `'${brand.bodyFont}', sans-serif`, color: brand.text }}>
                <div style={{ fontSize: 16, lineHeight: 1.8, marginBottom: 14 }}>
                  Body text at 16px. Clean, readable, and professional. This is how paragraphs look across the site on all devices.
                </div>
                <div style={{ fontSize: 13, color: "#888", lineHeight: 1.65 }}>
                  Caption / small text at 13px — labels, metadata, and supporting copy.
                </div>
              </div>
            </div>
          </div>

          <div style={{ marginBottom: 56 }}>
            <p style={{
              fontSize: 11, color: "#aaa", letterSpacing: "0.1em",
              textTransform: "uppercase", marginBottom: 24,
              fontFamily: `'${brand.bodyFont}', sans-serif`
            }}>Color Palette</p>
            <div style={{ display: "flex", gap: 16 }}>
              {[
                { label: "Burgundy", color: "#6b3849" },
                { label: "Forest", color: "#4a584c" },
                { label: "Burnt Orange", color: "#d96d00" },
                { label: "Terracotta", color: "#d4614a" },
                { label: "Warm Sand", color: "#e8b4a0" },
                { label: "Peach", color: "#e4a76d" },
                { label: "Sage", color: "#7a9e8e" },
                { label: "Cream", color: "#faf9f5" },
              ].map((c, i) => (
                <div key={i} style={{ flex: 1 }}>
                  <div style={{
                    height: 72, borderRadius: 6, background: c.color,
                    border: c.color === "#faf9f5" ? "1px solid #e0d8d0" : "none",
                    marginBottom: 8, boxShadow: "0 2px 6px rgba(0,0,0,0.08)"
                  }} />
                  <div style={{ fontSize: 11, fontWeight: 600, color: brand.text, marginBottom: 2 }}>{c.label}</div>
                  <div style={{ fontSize: 10, color: "#aaa", fontFamily: "monospace" }}>{c.color}</div>
                </div>
              ))}
            </div>
          </div>

          <div>
            <p style={{
              fontSize: 11, color: "#aaa", letterSpacing: "0.1em",
              textTransform: "uppercase", marginBottom: 20,
              fontFamily: `'${brand.bodyFont}', sans-serif`
            }}>Button & Link Styles</p>
            <div style={{ display: "flex", gap: 16, alignItems: "center", flexWrap: "wrap" }}>
              <div style={{
                background: brand.secondary, color: "white",
                padding: "14px 28px", borderRadius: 6, fontSize: 14, fontWeight: 700,
                fontFamily: `'${brand.bodyFont}', sans-serif`, cursor: "pointer"
              }}>Primary Button</div>
              <div style={{
                background: brand.primary, color: "white",
                padding: "14px 28px", borderRadius: 6, fontSize: 14, fontWeight: 700,
                fontFamily: `'${brand.bodyFont}', sans-serif`, cursor: "pointer"
              }}>Secondary Button</div>
              <div style={{
                border: `2px solid ${brand.primary}`, color: brand.primary,
                padding: "12px 28px", borderRadius: 6, fontSize: 14, fontWeight: 600,
                background: "transparent", fontFamily: `'${brand.bodyFont}', sans-serif`, cursor: "pointer"
              }}>Outline Button</div>
              <div style={{
                color: brand.secondary, fontSize: 14, fontWeight: 600,
                borderBottom: `2px solid ${brand.secondary}`, paddingBottom: 2,
                fontFamily: `'${brand.bodyFont}', sans-serif`, cursor: "pointer"
              }}>Text Link →</div>
            </div>
          </div>
        </div>
      );

      const colorFields = [
        { key: "primary", label: "Primary / Headings" },
        { key: "secondary", label: "Buttons & Links" },
        { key: "accent", label: "Section Background" },
        { key: "background", label: "Page Background" },
        { key: "text", label: "Body Text" },
      ];

      return (
        <div style={s.page}>
          <div style={s.sidebar}>
            <div>
              <div style={{ fontSize: 16, fontWeight: 700, color: "white", marginBottom: 4, fontFamily: "'roca', sans-serif" }}>Brand Visualizer</div>
              <div style={{ fontSize: 11, color: "#6b5a52", lineHeight: 1.5 }}>Roca loaded via Adobe Fonts. Adjust colors and details below.</div>
            </div>

            <div>
              <div style={s.sidebarTitle}>Brand Name</div>
              <input style={s.input} value={draft.brandName}
                onChange={e => setDraft({ ...draft, brandName: e.target.value })} />
            </div>

            <div>
              <div style={s.sidebarTitle}>Tagline</div>
              <input style={s.input} value={draft.tagline}
                onChange={e => setDraft({ ...draft, tagline: e.target.value })} />
            </div>

            <div>
              <div style={s.sidebarTitle}>Fonts</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <div>
                  <label style={s.label}>Display Font</label>
                  <div style={{
                    background: "#111", border: "1px solid #3a2e28", borderRadius: 6,
                    padding: "8px 10px", fontSize: 13, color: "#d96d00"
                  }}>Roca <span style={{ color: "#4a3830", fontSize: 11 }}>(Adobe — locked)</span></div>
                </div>
                <div>
                  <label style={s.label}>Body Font</label>
                  <input style={s.input} value={draft.bodyFont} placeholder="e.g. Sora, Poppins, Nunito"
                    onChange={e => setDraft({ ...draft, bodyFont: e.target.value })} />
                  <div style={{ fontSize: 10, color: "#4a3830", marginTop: 5, lineHeight: 1.5 }}>
                    Google Fonts name. Try: {GOOGLE_FONT_SUGGESTIONS.slice(0, 4).join(", ")}
                  </div>
                </div>
              </div>
            </div>

            <div>
              <div style={s.sidebarTitle}>Colors</div>
              {colorFields.map(({ key, label }) => (
                <div key={key} style={s.colorRow}>
                  <div style={s.colorSwatch(draft[key])}>
                    <input type="color" value={draft[key]} style={s.colorInputHidden}
                      onChange={e => setDraft({ ...draft, [key]: e.target.value })} />
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 11, color: "#9a8880", marginBottom: 3 }}>{label}</div>
                    <input
                      style={{ ...s.input, padding: "5px 8px", fontSize: 11, fontFamily: "monospace" }}
                      value={draft[key]}
                      onChange={e => setDraft({ ...draft, [key]: e.target.value })} />
                  </div>
                </div>
              ))}
            </div>

            <button style={s.applyBtn} onClick={apply}>Apply Brand Kit →</button>
          </div>

          <div style={s.preview}>
            <div style={s.tabs}>
              {[
                { id: "hero", label: "Website Preview" },
                { id: "type", label: "Style Guide" },
              ].map(t => (
                <button key={t.id} style={s.tab(activeTab === t.id)} onClick={() => setActiveTab(t.id)}>
                  {t.label}
                </button>
              ))}
            </div>
            <div style={{ flex: 1, overflowY: "auto", background: brand.background, fontFamily: `'${brand.bodyFont}', sans-serif` }}>
              {navBar}
              {activeTab === "hero" && <>{heroSection}{featuresSection}{ctaSection}</>}
              {activeTab === "type" && typographySection}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<BrandMockup />);
  </script>
</body>
</html>
